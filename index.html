<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Start your development with JohnDoe landing page.">
    <meta name="author" content="Devcrud">
    <title>Aymane Jebari</title>
    <!-- font icons -->
    <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css">
    <!-- Bootstrap + JohnDoe main styles -->
    <link rel="stylesheet" href="assets/css/johndoe.css">
</head>
<body data-spy="scroll" data-target=".navbar" data-offset="40" id="home">

    <div data-include="partials/header.html"></div>
    <div data-include="partials/navbar.html"></div>
    <div data-include="partials/about.html"></div>
    <div data-include="partials/resume.html"></div>
    <div data-include="partials/projects.html"></div>
    <div data-include="partials/certificates.html"></div>
    <div data-include="partials/contact.html"></div>
    <div data-include="partials/footer.html"></div>

    <script>
    (async function () {
        const includes = document.querySelectorAll('[data-include]');
        await Promise.all([...includes].map(async function (el) {
            try {
                const res = await fetch(el.dataset.include);
                el.innerHTML = await res.text();
            } catch (e) {
                console.error('Failed to load partial:', el.dataset.include);
            }
        }));

        function loadScript(src) {
            return new Promise(function (resolve, reject) {
                var s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        await loadScript('assets/vendors/jquery/jquery-3.4.1.js');
        await loadScript('assets/vendors/bootstrap/bootstrap.bundle.js');
        await loadScript('assets/vendors/bootstrap/bootstrap.affix.js');
        await loadScript('assets/vendors/isotope/isotope.pkgd.js');
        await loadScript('assets/js/johndoe.js');
    })();
    </script>

</body>
</html>
